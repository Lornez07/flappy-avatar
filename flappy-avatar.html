<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Avatar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            padding: 10px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: white;
            margin-bottom: 15px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .upload-section {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            border: 2px solid white;
            transition: transform 0.3s, box-shadow 0.3s;
            white-space: nowrap;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        #imagePreview {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            display: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .crop-section {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .crop-section.active {
            display: block;
        }

        .crop-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
            border: 2px solid white;
            border-radius: 50%;
            overflow: hidden;
            background: black;
        }

        #cropCanvas {
            display: block;
            width: 100%;
            height: 300px;
        }

        .crop-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .crop-btn {
            background: #2ecc71;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            border: none;
            transition: background 0.3s;
        }

        .crop-btn:hover {
            background: #27ae60;
        }

        .crop-btn.cancel {
            background: #e74c3c;
        }

        .crop-btn.cancel:hover {
            background: #c0392b;
        }

        .crop-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8em;
            margin-top: 10px;
        }

        .crop-sliders {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .slider-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75em;
            text-align: center;
        }

        .slider-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .zoom-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .zoom-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75em;
            text-align: center;
        }

        .zoom-buttons {
            display: flex;
            gap: 5px;
        }

        .zoom-buttons button {
            flex: 1;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.2s;
        }

        .zoom-buttons button:hover {
            background: rgba(102, 126, 234, 1);
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .score-bar {
            background: rgba(0, 0, 0, 0.3);
            color: #ffd700;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid white;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            display: block;
            margin: 0 auto 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        .status {
            color: white;
            font-size: 1em;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status.ready {
            color: #90ee90;
        }

        .status.playing {
            color: #87ceeb;
        }

        .status.gameover {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 1.2em;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.8);
            margin-top: 15px;
            font-size: 0.85em;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Flappy Avatar</h1>
        
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <div class="upload-btn" onclick="document.getElementById('imageInput').click()">
                📤 Upload Image
            </div>
            <img id="imagePreview" alt="Avatar">
        </div>

        <div class="crop-section" id="cropSection">
            <p style="color: white; margin-bottom: 10px; font-size: 0.9em;">Position your avatar in the circle:</p>
            <div class="crop-container">
                <canvas id="cropCanvas"></canvas>
            </div>
            <div class="crop-sliders">
                <div class="slider-group">
                    <label>Move Left/Right</label>
                    <input type="range" id="sliderX" min="-100" max="100" value="0">
                </div>
                <div class="slider-group">
                    <label>Move Up/Down</label>
                    <input type="range" id="sliderY" min="-100" max="100" value="0">
                </div>
                <div class="zoom-group">
                    <label>Zoom</label>
                    <div class="zoom-buttons">
                        <button onclick="changeZoom(-0.2)">−</button>
                        <button onclick="changeZoom(0.2)">+</button>
                    </div>
                </div>
            </div>
            <div class="crop-controls">
                <button class="crop-btn" onclick="confirmCrop()">✓ Use This</button>
                <button class="crop-btn cancel" onclick="cancelCrop()">✕ Change Image</button>
            </div>
        </div>

        <div class="game-section" id="gameSection">
            <div class="score-bar">Score: <span id="score">0</span></div>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div class="status" id="status"></div>
        </div>

        <div class="instructions">
            <p>📤 Upload your image → Press SPACE to start → Avoid pipes!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const gameSection = document.getElementById('gameSection');
        const cropSection = document.getElementById('cropSection');
        const cropCanvas = document.getElementById('cropCanvas');
        const cropCtx = cropCanvas.getContext('2d');
        const sliderX = document.getElementById('sliderX');
        const sliderY = document.getElementById('sliderY');
        const statusDisplay = document.getElementById('status');
        const scoreDisplay = document.getElementById('score');

        let playerImage = null;
        let originalImage = null;
        let cropOffsetX = 0;
        let cropOffsetY = 0;
        let cropZoom = 1;
        let gameStarted = false;
        let gameRunning = false;
        let gameOver = false;

        // Game variables
        const GRAVITY = 0.6;
        const FLAP_STRENGTH = -12;
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 150;
        const PIPE_SPACING = 200;
        const AVATAR_SIZE = 40;

        let player = {
            x: 60,
            y: 300,
            width: AVATAR_SIZE,
            height: AVATAR_SIZE,
            velocityY: 0
        };

        let pipes = [];
        let score = 0;
        let pipeCounter = 0;

        // Image upload handler
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    originalImage = new Image();
                    originalImage.onload = () => {
                        cropOffsetX = 0;
                        cropOffsetY = 0;
                        cropZoom = 1;
                        sliderX.value = 0;
                        sliderY.value = 0;
                        cropSection.classList.add('active');
                        drawCropPreview();
                    };
                    originalImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        sliderX.addEventListener('input', () => {
            cropOffsetX = parseInt(sliderX.value);
            drawCropPreview();
        });

        sliderY.addEventListener('input', () => {
            cropOffsetY = parseInt(sliderY.value);
            drawCropPreview();
        });

        function changeZoom(delta) {
            cropZoom = Math.max(0.5, Math.min(3, cropZoom + delta));
            drawCropPreview();
        }

        function drawCropPreview() {
            cropCanvas.width = 300;
            cropCanvas.height = 300;

            cropCtx.fillStyle = '#000';
            cropCtx.fillRect(0, 0, 300, 300);

            cropCtx.save();

            // Draw circle mask
            cropCtx.beginPath();
            cropCtx.arc(150, 150, 150, 0, Math.PI * 2);
            cropCtx.clip();

            // Calculate scaled image
            const scaledWidth = originalImage.width * cropZoom;
            const scaledHeight = originalImage.height * cropZoom;
            const x = 150 - scaledWidth / 2 + cropOffsetX;
            const y = 150 - scaledHeight / 2 + cropOffsetY;

            // Enable image smoothing for quality
            cropCtx.imageSmoothingEnabled = true;
            cropCtx.imageSmoothingQuality = 'high';

            cropCtx.drawImage(originalImage, x, y, scaledWidth, scaledHeight);
            cropCtx.restore();

            // Draw circle border
            cropCtx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            cropCtx.lineWidth = 2;
            cropCtx.beginPath();
            cropCtx.arc(150, 150, 150, 0, Math.PI * 2);
            cropCtx.stroke();
        }

        function confirmCrop() {
            // Create circular avatar canvas
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = AVATAR_SIZE;
            tempCanvas.height = AVATAR_SIZE;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.imageSmoothingEnabled = true;
            tempCtx.imageSmoothingQuality = 'high';

            // Draw circular clipped image
            const scaledWidth = originalImage.width * cropZoom;
            const scaledHeight = originalImage.height * cropZoom;
            const offsetX = (cropOffsetX / 150) * AVATAR_SIZE * 0.5;
            const offsetY = (cropOffsetY / 150) * AVATAR_SIZE * 0.5;

            tempCtx.save();
            tempCtx.beginPath();
            tempCtx.arc(AVATAR_SIZE / 2, AVATAR_SIZE / 2, AVATAR_SIZE / 2, 0, Math.PI * 2);
            tempCtx.clip();

            tempCtx.drawImage(
                originalImage,
                AVATAR_SIZE / 2 - (scaledWidth / 300) * AVATAR_SIZE * 0.5 + offsetX,
                AVATAR_SIZE / 2 - (scaledHeight / 300) * AVATAR_SIZE * 0.5 + offsetY,
                (scaledWidth / 300) * AVATAR_SIZE,
                (scaledHeight / 300) * AVATAR_SIZE
            );
            tempCtx.restore();

            // Convert to image for game use
            playerImage = new Image();
            playerImage.onload = () => {
                // Update preview
                imagePreview.src = playerImage.src;
                imagePreview.style.display = 'block';

                cropSection.classList.remove('active');
                gameSection.classList.add('active');
                resetGame();
                updateStatus('Press SPACE to start!');
                
                // Draw with avatar
                draw();
            };
            playerImage.src = tempCanvas.toDataURL();
        }

        function cancelCrop() {
            cropSection.classList.remove('active');
            imageInput.value = '';
        }

        function updateStatus(text, type = 'ready') {
            statusDisplay.textContent = text;
            statusDisplay.className = `status ${type}`;
        }

        function resetGame() {
            gameStarted = false;
            gameRunning = false;
            gameOver = false;
            player.y = canvas.height / 2;
            player.velocityY = 0;
            score = 0;
            scoreDisplay.textContent = score;
            pipes = [];
            pipeCounter = 0;
            draw();
        }

        function startGame() {
            if (!playerImage) return;
            gameStarted = true;
            gameRunning = true;
            gameOver = false;
            updateStatus('Game Running!', 'playing');
            gameLoop();
        }

        function update() {
            if (!gameRunning || gameOver) return;

            player.velocityY += GRAVITY;
            player.y += player.velocityY;

            if (player.y + player.height > canvas.height || player.y < 0) {
                endGame();
                return;
            }

            pipeCounter++;
            if (pipeCounter > PIPE_SPACING) {
                const gapStart = Math.random() * (canvas.height - PIPE_GAP - 100) + 50;
                pipes.push({
                    x: canvas.width,
                    gapStart: gapStart,
                    gapEnd: gapStart + PIPE_GAP,
                    scored: false
                });
                pipeCounter = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 5;

                if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < player.x) {
                    score++;
                    scoreDisplay.textContent = score;
                    pipes[i].scored = true;
                }

                if (
                    player.x < pipes[i].x + PIPE_WIDTH &&
                    player.x + player.width > pipes[i].x &&
                    (player.y < pipes[i].gapStart || player.y + player.height > pipes[i].gapEnd)
                ) {
                    endGame();
                    return;
                }

                if (pipes[i].x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
        }

        function draw() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#e0f6ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // Draw circular player with white outline
            if (playerImage) {
                ctx.save();
                
                // Draw circle background
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.width / 2 + 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Clip and draw image
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.width / 2, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(playerImage, player.x - player.width / 2, player.y - player.height / 2, player.width, player.height);
                
                ctx.restore();
                
                // Draw circle outline
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.width / 2, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.fillStyle = '#2ecc71';
            for (let pipe of pipes) {
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.gapStart);
                ctx.fillRect(pipe.x, pipe.gapEnd, PIPE_WIDTH, canvas.height - pipe.gapEnd);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(pipe.x - 5, pipe.gapStart - 10, PIPE_WIDTH + 10, 10);
                ctx.fillRect(pipe.x - 5, pipe.gapEnd, PIPE_WIDTH + 10, 10);
                ctx.fillStyle = '#2ecc71';
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning && !gameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            updateStatus(`Game Over! Score: ${score} | Press SPACE to restart`, 'gameover');
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (!gameStarted && playerImage) {
                    startGame();
                } else if (gameRunning) {
                    player.velocityY = FLAP_STRENGTH;
                } else if (gameOver) {
                    resetGame();
                    updateStatus('Press SPACE to start!');
                }
            }
        });

        canvas.addEventListener('click', () => {
            if (!gameStarted && playerImage) {
                startGame();
            } else if (gameRunning) {
                player.velocityY = FLAP_STRENGTH;
            } else if (gameOver) {
                resetGame();
                updateStatus('Press SPACE to start!');
            }
        });
    </script>
</body>
</html>
